<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ASQ-3 Age Ranges</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root{
    --bg:#FBFAF7;
    --surface:#FFFFFF;
    --primary:#0B4F8C;
    --primary-soft:#E8F0F8;
    --accent:#3E9CD1;
    --text:#131A2B;
    --text-muted:#5A6478;
    --border:#E6E4DE;
    --border-strong:#C9CDD6;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:#f0eee9; }
  body{
    font-family:'Inter', system-ui, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }

  .finder{
    width:768px;
    height:260px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 1px 3px rgba(19,26,43,0.06), 0 8px 24px rgba(19,26,43,0.06);
    padding:18px 24px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    color:var(--text);
    letter-spacing:-0.005em;
  }

  .f-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .f-title{
    font-size:15px;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0;
  }
  .f-title .sup{ font-size:9px; vertical-align:super; }
  .f-sub{
    font-size:11px;
    color:var(--text-muted);
    margin:2px 0 0;
  }
  .f-result{
    display:flex;
    align-items:baseline;
    gap:8px;
    background:var(--primary-soft);
    border-radius:8px;
    padding:8px 16px;
    flex:0 0 auto;
    white-space:nowrap;
  }
  .f-result .l{
    font-size:9px;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--primary);
  }
  .f-result .v{
    font-size:22px;
    font-weight:800;
    color:var(--primary);
    letter-spacing:-0.02em;
  }
  .f-result .v .unit{
    font-size:12px;
    font-weight:600;
    margin-left:2px;
  }

  .f-controls{
    display:flex;
    gap:28px;
    align-items:flex-end;
  }
  .ctrl{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .ctrl.days{ flex: 0 0 220px; }
  .ctrl-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .ctrl-label{
    font-size:10px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .ctrl-value{
    font-size:13px;
    font-weight:700;
    color:var(--text);
  }
  input[type="range"]{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height:6px;
    border-radius:3px;
    background:var(--border);
    outline:none;
    cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    appearance:none;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--primary);
    border:3px solid white;
    box-shadow:0 0 0 1px var(--primary);
    cursor:pointer;
  }
  input[type="range"]::-moz-range-thumb{
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--primary);
    border:3px solid white;
    box-shadow:0 0 0 1px var(--primary);
    cursor:pointer;
  }

  .f-track{
    display:flex;
    gap:3px;
    flex:1;
  }
  .tile{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    padding:6px 2px;
    border-radius:5px;
    background:var(--bg);
    border:1px solid var(--border);
    transition:background .12s, border-color .12s, transform .12s;
  }
  .tile .n{
    font-size:11px;
    font-weight:700;
    color:var(--text-muted);
  }
  .tile .u{
    font-size:7.5px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .tile.active{
    background:var(--primary);
    border-color:var(--primary);
    transform:translateY(-2px);
  }
  .tile.active .n,
  .tile.active .u{ color:#fff; }

  .f-foot{
    font-size:9.5px;
    line-height:1.4;
    color:var(--text-muted);
  }
  .f-foot b{ color:var(--text); }
</style>
</head>
<body>

  <div class="finder">
    <div class="f-header">
      <div>
        <p class="f-title">ASQ<span class="sup">®</span>-3 Age Ranges</p>
        <p class="f-sub">Move the sliders to the child's age to find which questionnaire to use.</p>
      </div>
      <div class="f-result">
        <span class="l">Use this ASQ-3</span>
        <span class="v" id="resultVal">2<span class="unit">month</span></span>
      </div>
    </div>

    <div class="f-controls">
      <div class="ctrl">
        <div class="ctrl-top">
          <span class="ctrl-label">Months</span>
          <span class="ctrl-value" id="monthsVal">1</span>
        </div>
        <input type="range" id="monthsSlider" min="1" max="66" step="1" value="1"/>
      </div>
      <div class="ctrl days">
        <div class="ctrl-top">
          <span class="ctrl-label">Days</span>
          <span class="ctrl-value" id="daysVal">0</span>
        </div>
        <input type="range" id="daysSlider" min="0" max="30" step="1" value="0"/>
      </div>
    </div>

    <div class="f-track" id="track"></div>

    <p class="f-foot"><b>*</b>Adjusting for prematurity is necessary if the child was born 3+ weeks before their due date, up until the child reaches 24 months old.</p>
  </div>

<script>
  var brackets = [
    {m0:1,d0:0,  m1:2,d1:30,  label:2},
    {m0:3,d0:0,  m1:4,d1:30,  label:4},
    {m0:5,d0:0,  m1:6,d1:30,  label:6},
    {m0:7,d0:0,  m1:8,d1:30,  label:8},
    {m0:9,d0:0,  m1:9,d1:30,  label:9},
    {m0:10,d0:0, m1:10,d1:30, label:10},
    {m0:11,d0:0, m1:12,d1:30, label:12},
    {m0:13,d0:0, m1:14,d1:30, label:14},
    {m0:15,d0:0, m1:16,d1:30, label:16},
    {m0:17,d0:0, m1:18,d1:30, label:18},
    {m0:19,d0:0, m1:20,d1:30, label:20},
    {m0:21,d0:0, m1:22,d1:30, label:22},
    {m0:23,d0:0, m1:25,d1:15, label:24},
    {m0:25,d0:16,m1:28,d1:15, label:27},
    {m0:28,d0:16,m1:31,d1:15, label:30},
    {m0:31,d0:16,m1:34,d1:15, label:33},
    {m0:34,d0:16,m1:38,d1:30, label:36},
    {m0:39,d0:0, m1:44,d1:30, label:42},
    {m0:45,d0:0, m1:50,d1:30, label:48},
    {m0:51,d0:0, m1:56,d1:30, label:54},
    {m0:57,d0:0, m1:66,d1:0,  label:60}
  ];

  function key(m,d){ return m*100+d; }

  var trackEl = document.getElementById('track');
  brackets.forEach(function(b, i){
    var tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = 'tile-' + i;
    tile.innerHTML = '<span class="n">' + b.label + '</span><span class="u">mo</span>';
    trackEl.appendChild(tile);
  });

  var monthsSlider = document.getElementById('monthsSlider');
  var daysSlider = document.getElementById('daysSlider');
  var monthsVal = document.getElementById('monthsVal');
  var daysVal = document.getElementById('daysVal');
  var resultVal = document.getElementById('resultVal');

  function update(){
    var m = parseInt(monthsSlider.value, 10);
    var d = parseInt(daysSlider.value, 10);
    monthsVal.textContent = m;
    daysVal.textContent = d;

    var k = key(m,d);
    var matchIdx = -1;
    for (var i = 0; i < brackets.length; i++){
      var b = brackets[i];
      if (k >= key(b.m0,b.d0) && k <= key(b.m1,b.d1)){
        matchIdx = i;
        break;
      }
    }
    if (matchIdx === -1){
      // out of range fallback: clamp to nearest end
      matchIdx = (k < key(brackets[0].m0, brackets[0].d0)) ? 0 : brackets.length - 1;
    }

    brackets.forEach(function(b, i){
      document.getElementById('tile-' + i).classList.toggle('active', i === matchIdx);
    });

    resultVal.innerHTML = brackets[matchIdx].label + '<span class="unit">month</span>';
  }

  monthsSlider.addEventListener('input', update);
  daysSlider.addEventListener('input', update);
  update();
</script>
</body>
</html>
